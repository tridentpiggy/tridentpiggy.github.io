# Setup
title: JZ的博客
description: Blogs For All
url: https://tridentpiggy.github.io
avatar: /avatar.jpeg
paginate: 5
permalink: pretty
cover_image: /back.jpg

# Gems
plugins:
  - jekyll-gist
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Optimize Jekyll
exclude:
  - .editorconfig
  - .git
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md
  - scripts/
  - not-pure-poole.gemspec

# Optimize Jekyl SEO Tag
twitter:
  username: tridentpiggy
  card: summary
logo: logo.png
social:
  name: JZ
  links:
    - https://twitter.com/tridentpiggy
    - https://github.com/tridentpiggy
google_site_verification: xxxxx
lang: zh

sass:
  sass_dir: _sass
  style: :compressed

# Options

# Replace this value and uncomment to enable Google Analytics tracking
# google_analytics: UA-000000-0

# Replace this value and uncomment to enable Disqus
# disqus: xxxxxx

# Specify the author for blog posts
author:
  name: JZ
  url: https://github.com/tridentpiggy/
  email: plokmijn31@outlook.com
